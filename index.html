<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Virat Kohli Complete Career</title>
    <style>
        body{
            margin:0;
            padding:20px;
            font-family:Arial,sans-serif;
            background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
            color:white;
        }

        h1{
            text-align:center;
            margin-bottom:10px;
        }

        p{
            text-align:center;
            color:#ddd;
        }

        .api-section{
            max-width:700px;
            margin:30px auto;
            text-align:center;
        }

        input{
            width:100%;
            padding:15px;
            font-size:16px;
            border:none;
            border-radius:10px;
            margin-bottom:15px;
        }

        button{
            padding:15px 35px;
            font-size:18px;
            border:none;
            border-radius:10px;
            background:#00c6ff;
            color:white;
            cursor:pointer;
        }

        button:hover{
            opacity:.9;
        }

        #status{
            text-align:center;
            margin:20px 0;
            font-size:20px;
        }

        table{
            width:100%;
            border-collapse:collapse;
            margin-top:20px;
            background:rgba(255,255,255,0.08);
            backdrop-filter:blur(10px);
        }

        th,td{
            padding:12px;
            text-align:center;
            border-bottom:1px solid rgba(255,255,255,0.1);
        }

        th{
            background:rgba(0,0,0,0.4);
            position:sticky;
            top:0;
        }

        tr:hover{
            background:rgba(255,255,255,0.12);
        }

        .century{
            color:gold;
            font-weight:bold;
        }
    </style>
</head>
<body>

<h1>🏏 Virat Kohli International Career</h1>
<p>Complete Match-by-Match Batting Record</p>

<div class="api-section">
    <input type="text" id="apiKey" placeholder="Enter your Sportmonks API Token">
    <button onclick="loadCareer()">Load Career</button>
</div>

<div id="status"></div>

<table id="careerTable" style="display:none;">
    <thead>
        <tr>
            <th>#</th>
            <th>Date</th>
            <th>Format</th>
            <th>Opponent</th>
            <th>Runs</th>
            <th>Balls</th>
            <th>Strike Rate</th>
        </tr>
    </thead>
    <tbody id="tableBody"></tbody>
</table>

<script>
const VIRAT_PLAYER_ID = 637; // Verify in your Sportmonks account

async function loadCareer() {
    const token = document.getElementById('apiKey').value.trim();
    const status = document.getElementById('status');

    if (!token) {
        alert('Please enter your Sportmonks API token.');
        return;
    }

    status.textContent = 'Loading Virat Kohli career data...';

    try {
        const response = await fetch(
            `https://cricket.sportmonks.com/api/v2.0/players/${VIRAT_PLAYER_ID}?api_token=${token}&include=career,teams`
        );

        const data = await response.json();

        if (!data.data) {
            throw new Error('Invalid API response.');
        }

        /*
          NOTE:
          Full innings-by-innings data requires fixture and scorecard endpoints.
          This sample demonstrates the connection.
        */

        status.textContent =
            'Connected successfully! Next step: fetch scorecards for every international match.';

        document.getElementById('careerTable').style.display = 'table';

    } catch (error) {
        status.textContent = 'Error: ' + error.message;
    }
}
</script>

</body>
</html>
