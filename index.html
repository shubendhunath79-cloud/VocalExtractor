<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Virat Kohli Career Dashboard</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 20px;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            color: white;
        }

        h1 {
            text-align: center;
            margin-bottom: 10px;
        }

        .subtitle {
            text-align: center;
            color: #d0d0d0;
            margin-bottom: 30px;
        }

        .top-bar {
            text-align: center;
            margin-bottom: 25px;
        }

        button {
            background: #00c6ff;
            color: white;
            border: none;
            padding: 14px 28px;
            border-radius: 10px;
            font-size: 18px;
            cursor: pointer;
        }

        button:hover {
            opacity: 0.9;
        }

        #status {
            text-align: center;
            font-size: 20px;
            margin: 20px 0;
        }

        .player-card {
            max-width: 800px;
            margin: 0 auto 30px;
            background: rgba(255,255,255,0.1);
            padding: 25px;
            border-radius: 20px;
            text-align: center;
            display: none;
        }

        .player-card img {
            width: 150px;
            border-radius: 50%;
            margin-bottom: 20px;
            border: 4px solid white;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: rgba(255,255,255,0.1);
            padding: 25px;
            border-radius: 18px;
            text-align: center;
        }

        .stat-card h2 {
            margin: 0;
            font-size: 42px;
        }

        .stat-card p {
            margin-top: 10px;
            color: #ddd;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: rgba(255,255,255,0.08);
            display: none;
        }

        th, td {
            padding: 15px;
            text-align: center;
            border-bottom: 1px solid rgba(255,255,255,0.15);
        }

        th {
            background: rgba(0,0,0,0.4);
        }

        tr:hover {
            background: rgba(255,255,255,0.12);
        }
    </style>
</head>
<body>

    <h1>🏏 Virat Kohli Career Dashboard</h1>
    <p class="subtitle">Live International Statistics using CricAPI</p>

    <div class="top-bar">
        <button onclick="loadViratData()">Load Virat Kohli Data</button>
    </div>

    <div id="status">Click the button to fetch live data.</div>

    <div id="playerCard" class="player-card">
        <img id="playerImage" src="" alt="Virat Kohli">
        <h2 id="playerName"></h2>
        <p id="playerInfo"></p>
    </div>

    <div id="careerStats" class="stats-grid"></div>

    <table id="statsTable">
        <thead>
            <tr>
                <th>Format</th>
                <th>Matches</th>
                <th>Runs</th>
                <th>Average</th>
                <th>Strike Rate</th>
                <th>100s</th>
                <th>50s</th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>

<script>
const API_KEY = "YOUR_CRICAPI_KEY_HERE";
const PLAYER_ID = "253802";

async function loadViratData() {
    const status = document.getElementById("status");
    status.textContent = "Loading Virat Kohli's career...";

    try {
        const response = await fetch(
            `https://api.cricapi.com/v1/players_info?apikey=${API_KEY}&id=${PLAYER_ID}`
        );

        const result = await response.json();

        if (result.status !== "success") {
            throw new Error(result.reason || "Unable to fetch data");
        }

        const player = result.data;

        displayPlayer(player);
        displayStats(player.stats);

        status.textContent = "Data loaded successfully!";
    } catch (error) {
        status.textContent = "Error: " + error.message;
    }
}

function displayPlayer(player) {
    document.getElementById("playerCard").style.display = "block";
    document.getElementById("playerImage").src =
        player.playerImg || "https://static.cricapi.com/player-images/253802.jpg";

    document.getElementById("playerName").textContent = player.name;
    document.getElementById("playerInfo").textContent =
        `${player.country} • ${player.role} • ${player.battingStyle}`;
}

function displayStats(stats) {
    const table = document.getElementById("statsTable");
    const tbody = document.getElementById("tableBody");
    const cards = document.getElementById("careerStats");

    tbody.innerHTML = "";
    cards.innerHTML = "";

    let totalRuns = 0;
    let totalMatches = 0;
    let totalHundreds = 0;

    stats.forEach(stat => {
        const format = stat.fn.toLowerCase();

        if (["odi", "t20i", "test"].includes(format)) {
            tbody.innerHTML += `
                <tr>
                    <td>${stat.fn.toUpperCase()}</td>
                    <td>${stat.match || "-"}</td>
                    <td>${stat.run || "-"}</td>
                    <td>${stat.avg || "-"}</td>
                    <td>${stat.sr || "-"}</td>
                    <td>${stat["100"] || "-"}</td>
                    <td>${stat["50"] || "-"}</td>
                </tr>
            `;

            totalRuns += Number(stat.run || 0);
            totalMatches += Number(stat.match || 0);
            totalHundreds += Number(stat["100"] || 0);
        }
    });

    cards.innerHTML = `
        <div class="stat-card">
            <h2>${totalRuns}</h2>
            <p>Total Runs</p>
        </div>
        <div class="stat-card">
            <h2>${totalMatches}</h2>
            <p>International Matches</p>
        </div>
        <div class="stat-card">
            <h2>${totalHundreds}</h2>
            <p>International Centuries</p>
        </div>
    `;

    table.style.display = "table";
}
</script>

</body>
</html>
