<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diamond Rush Adventure</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: Arial, sans-serif;
            background: linear-gradient(to bottom, #0f2027, #203a43, #2c5364);
        }

        canvas {
            display: block;
            margin: 0 auto;
            background: #111;
            box-shadow: 0 0 30px cyan;
        }

        #ui {
            position: absolute;
            top: 15px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            font-size: 28px;
            text-shadow: 0 0 10px cyan;
            z-index: 10;
        }
    </style>
</head>
<body>

<div id="ui">💎 Diamonds: <span id="score">0</span></div>
<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const keys = {};
let score = 0;
let gameWon = false;

document.addEventListener("keydown", e => keys[e.key] = true);
document.addEventListener("keyup", e => keys[e.key] = false);

const player = {
    x: 100,
    y: canvas.height - 150,
    width: 45,
    height: 55,
    velocityX: 0,
    velocityY: 0,
    speed: 6,
    jumpPower: -16,
    grounded: false
};

const gravity = 0.8;

const platforms = [
    {x: 0, y: canvas.height - 40, width: canvas.width, height: 40},
    {x: 200, y: canvas.height - 180, width: 220, height: 20},
    {x: 520, y: canvas.height - 320, width: 220, height: 20},
    {x: 860, y: canvas.height - 460, width: 220, height: 20},
    {x: 1200, y: canvas.height - 260, width: 220, height: 20}
];

const diamonds = [
    {x: 280, y: canvas.height - 220, collected: false},
    {x: 610, y: canvas.height - 360, collected: false},
    {x: 950, y: canvas.height - 500, collected: false},
    {x: 1290, y: canvas.height - 300, collected: false}
];

function update() {
    if (gameWon) return;

    player.velocityX = 0;

    if (keys["ArrowLeft"]) player.velocityX = -player.speed;
    if (keys["ArrowRight"]) player.velocityX = player.speed;

    if ((keys["ArrowUp"] || keys[" "]) && player.grounded) {
        player.velocityY = player.jumpPower;
        player.grounded = false;
    }

    player.velocityY += gravity;
    player.x += player.velocityX;
    player.y += player.velocityY;

    player.grounded = false;

    for (const platform of platforms) {
        if (
            player.x < platform.x + platform.width &&
            player.x + player.width > platform.x &&
            player.y < platform.y + platform.height &&
            player.y + player.height > platform.y
        ) {
            if (player.velocityY >= 0) {
                player.y = platform.y - player.height;
                player.velocityY = 0;
                player.grounded = true;
            }
        }
    }

    for (const diamond of diamonds) {
        if (
            !diamond.collected &&
            player.x < diamond.x + 25 &&
            player.x + player.width > diamond.x &&
            player.y < diamond.y + 25 &&
            player.y + player.height > diamond.y
        ) {
            diamond.collected = true;
            score++;
            document.getElementById("score").textContent = score;

            if (score === diamonds.length) {
                gameWon = true;
                setTimeout(() => {
                    alert("🎉 Congratulations! You collected all diamonds!");
                }, 100);
            }
        }
    }

    if (player.x < 0) player.x = 0;
    if (player.x + player.width > canvas.width)
        player.x = canvas.width - player.width;

    if (player.y > canvas.height) {
        player.x = 100;
        player.y = canvas.height - 150;
        player.velocityY = 0;
    }
}

function drawPlayer() {
    ctx.fillStyle = "#00ffff";
    ctx.fillRect(player.x, player.y, player.width, player.height);
}

function drawPlatforms() {
    ctx.fillStyle = "#8B4513";
    for (const platform of platforms) {
        ctx.fillRect(platform.x, platform.y, platform.width, platform.height);
    }
}

function drawDiamonds() {
    ctx.fillStyle = "#00ffff";

    for (const diamond of diamonds) {
        if (!diamond.collected) {
            ctx.beginPath();
            ctx.moveTo(diamond.x + 12, diamond.y);
            ctx.lineTo(diamond.x + 25, diamond.y + 12);
            ctx.lineTo(diamond.x + 12, diamond.y + 25);
            ctx.lineTo(diamond.x, diamond.y + 12);
            ctx.closePath();
            ctx.fill();
        }
    }
}

function drawWinMessage() {
    if (gameWon) {
        ctx.fillStyle = "white";
        ctx.font = "bold 60px Arial";
        ctx.textAlign = "center";
        ctx.fillText("YOU WIN! 💎", canvas.width / 2, canvas.height / 2);
    }
}

function gameLoop() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    update();
    drawPlatforms();
    drawDiamonds();
    drawPlayer();
    drawWinMessage();

    requestAnimationFrame(gameLoop);
}

gameLoop();

window.addEventListener("resize", () => {
    location.reload();
});
</script>

</body>
</html>
