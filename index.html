<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake Game</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-black via-green-900 to-black min-h-screen flex items-center justify-center text-white">

    <div class="bg-white/10 backdrop-blur-lg rounded-3xl p-8 shadow-2xl border border-white/20 text-center">
        <h1 class="text-5xl font-bold mb-4">🐍 Snake Game</h1>
        <p class="text-gray-300 mb-6">Use Arrow Keys to Control the Snake</p>

        <canvas
            id="gameCanvas"
            width="400"
            height="400"
            class="mx-auto border-4 border-green-500 rounded-2xl bg-black"
        ></canvas>

        <div class="mt-6 text-2xl">
            Score: <span id="score">0</span>
        </div>

        <button
            onclick="restartGame()"
            class="mt-6 bg-green-600 hover:bg-green-700 px-6 py-3 rounded-xl text-lg font-semibold transition"
        >
            Restart Game
        </button>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreElement = document.getElementById("score");

        const gridSize = 20;
        const tileCount = canvas.width / gridSize;

        let snake, direction, food, score, gameInterval;

        function initializeGame() {
            snake = [{ x: 10, y: 10 }];
            direction = { x: 1, y: 0 };
            food = generateFood();
            score = 0;
            scoreElement.textContent = score;

            if (gameInterval) clearInterval(gameInterval);
            gameInterval = setInterval(gameLoop, 120);
        }

        function generateFood() {
            return {
                x: Math.floor(Math.random() * tileCount),
                y: Math.floor(Math.random() * tileCount)
            };
        }

        document.addEventListener("keydown", changeDirection);

        function changeDirection(event) {
            const key = event.key;

            if (key === "ArrowUp" && direction.y === 0) {
                direction = { x: 0, y: -1 };
            } else if (key === "ArrowDown" && direction.y === 0) {
                direction = { x: 0, y: 1 };
            } else if (key === "ArrowLeft" && direction.x === 0) {
                direction = { x: -1, y: 0 };
            } else if (key === "ArrowRight" && direction.x === 0) {
                direction = { x: 1, y: 0 };
            }
        }

        function gameLoop() {
            const head = {
                x: snake[0].x + direction.x,
                y: snake[0].y + direction.y
            };

            if (
                head.x < 0 ||
                head.x >= tileCount ||
                head.y < 0 ||
                head.y >= tileCount ||
                snake.some(segment => segment.x === head.x && segment.y === head.y)
            ) {
                clearInterval(gameInterval);
                alert("Game Over! Your score: " + score);
                return;
            }

            snake.unshift(head);

            if (head.x === food.x && head.y === food.y) {
                score++;
                scoreElement.textContent = score;
                food = generateFood();
            } else {
                snake.pop();
            }

            drawGame();
        }

        function drawGame() {
            ctx.fillStyle = "black";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = "red";
            ctx.fillRect(
                food.x * gridSize,
                food.y * gridSize,
                gridSize,
                gridSize
            );

            snake.forEach((segment, index) => {
                ctx.fillStyle = index === 0 ? "#22c55e" : "#16a34a";
                ctx.fillRect(
                    segment.x * gridSize,
                    segment.y * gridSize,
                    gridSize - 2,
                    gridSize - 2
                );
            });
        }

        function restartGame() {
            initializeGame();
        }

        initializeGame();
    </script>

</body>
</html>
