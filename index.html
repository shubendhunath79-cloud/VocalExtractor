<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gully Legends: Batting Prototype</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #222;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 50px;
        }
        #game-board {
            width: 800px;
            height: 300px;
            background: linear-gradient(to bottom, #87CEEB 60%, #8B4513 40%);
            position: relative;
            border: 4px solid #fff;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.2);
        }
        #pitch {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 120px;
            background-color: #e3c498;
            border-top: 2px solid #a67c52;
        }
        #sweet-spot {
            position: absolute;
            right: 120px;
            bottom: 20px;
            width: 80px;
            height: 100px;
            background-color: rgba(50, 205, 50, 0.3);
            border: 3px dashed #32cd32;
        }
        #batter {
            position: absolute;
            right: 50px;
            bottom: 40px;
            width: 30px;
            height: 100px;
            background-color: #ff4500;
            border-radius: 5px;
        }
        #ball {
            position: absolute;
            left: -30px;
            bottom: 50px;
            width: 25px;
            height: 25px;
            background-color: #ffeb3b; /* Tape ball yellow */
            border-radius: 50%;
            box-shadow: inset -5px -5px 10px rgba(0,0,0,0.5);
            display: none;
        }
        .stats {
            display: flex;
            justify-content: space-between;
            width: 800px;
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 10px;
            text-transform: uppercase;
        }
        #feedback {
            font-size: 32px;
            font-weight: bold;
            color: #ffeb3b;
            height: 40px;
            margin-top: 20px;
            text-shadow: 2px 2px 4px #000;
        }
    </style>
</head>
<body>

    <div class="stats">
        <div>Score: <span id="score">0</span></div>
        <div>Swagger: <span id="swagger">0</span>%</div>
    </div>

    <div id="game-board">
        <div id="pitch"></div>
        <div id="sweet-spot"></div>
        <div id="batter"></div>
        <div id="ball"></div>
    </div>

    <div id="feedback">Press SPACEBAR to start the bowler!</div>

    <script>
        const ball = document.getElementById('ball');
        const feedback = document.getElementById('feedback');
        const scoreDisplay = document.getElementById('score');
        const swaggerDisplay = document.getElementById('swagger');
        
        let isPitched = false;
        let ballX = -30;
        let speed = 0;
        let score = 0;
        let swagger = 0;
        let animationId;

        // The exact pixel coordinates of the green "Sweet Spot" box
        const sweetSpotStart = 800 - 120 - 80; // Game Width - Right Pos - Box Width
        const sweetSpotEnd = 800 - 120;

        function pitchBall() {
            if (isPitched) return;
            isPitched = true;
            ballX = -30;
            ball.style.display = 'block';
            speed = Math.random() * 8 + 10; // Randomize bowling speed between 10 and 18
            feedback.innerText = "Here it comes...";
            feedback.style.color = "white";
            
            animateBall();
        }

        function animateBall() {
            ballX += speed;
            ball.style.left = ballX + 'px';

            if (ballX > 800) {
                // Ball passed the batter without a swing
                feedback.innerText = "Clean Bowled! You missed.";
                feedback.style.color = "red";
                swagger = 0; // Lose swagger
                swaggerDisplay.innerText = swagger;
                resetPitch();
            } else {
                animationId = requestAnimationFrame(animateBall);
            }
        }

        function swingBat() {
            if (!isPitched) {
                pitchBall();
                return;
            }

            cancelAnimationFrame(animationId);
            
            // Check timing
            if (ballX >= sweetSpotStart && ballX <= sweetSpotEnd) {
                // Perfect hit
                let power = Math.floor(Math.random() * 2); 
                let runs = power === 1 ? 6 : 4;
                score += runs;
                swagger = Math.min(100, swagger + 20);
                
                feedback.innerText = runs === 6 ? "BOOM! Massive SIX!" : "Beautiful Cover Drive for 4!";
                feedback.style.color = "#32cd32";
            } else if (ballX > sweetSpotEnd) {
                // Swung too late
                feedback.innerText = "Too Late! Caught behind.";
                feedback.style.color = "red";
                swagger = 0;
            } else {
                // Swung too early
                feedback.innerText = "Too Early! Leading edge.";
                feedback.style.color = "red";
                swagger = 0;
            }

            scoreDisplay.innerText = score;
            swaggerDisplay.innerText = swagger;
            resetPitch();
        }

        function resetPitch() {
            isPitched = false;
            ball.style.display = 'none';
            setTimeout(() => {
                if(!isPitched) {
                    feedback.innerText = "Press SPACEBAR for the next ball!";
                    feedback.style.color = "white";
                }
            }, 1500);
        }

        // Listen for Spacebar
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault(); // Stop page scrolling
                swingBat();
            }
        });
    </script>
</body>
</html>
