<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Vocal Extractor</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-black via-purple-900 to-black min-h-screen flex items-center justify-center text-white">

    <div class="bg-white/10 backdrop-blur-lg rounded-3xl p-10 w-full max-w-2xl shadow-2xl border border-white/20">
        <h1 class="text-5xl font-bold text-center mb-4">AI Vocal Extractor</h1>
        <p class="text-center text-gray-300 mb-8">
            Upload your song and extract crystal-clear vocals instantly.
        </p>

        <input
            type="file"
            id="audioFile"
            accept="audio/*"
            class="w-full mb-6 p-4 rounded-xl bg-black/30 border border-gray-600"
        >

        <button
            onclick="extractVocals()"
            class="w-full bg-purple-600 hover:bg-purple-700 transition duration-300 py-4 rounded-xl text-xl font-semibold"
        >
            Extract Vocals
        </button>

        <div id="status" class="mt-6 text-center text-lg"></div>
    </div>

    <script>
        async function extractVocals() {
            const fileInput = document.getElementById('audioFile');
            const status = document.getElementById('status');

            if (!fileInput.files.length) {
                status.innerText = 'Please select an audio file.';
                return;
            }

            const formData = new FormData();
            formData.append('audio', fileInput.files[0]);

            status.innerText = 'Processing... Please wait.';

            try {
                const response = await fetch('http://127.0.0.1:5000/extract', {
                    method: 'POST',
                    body: formData
                });

                if (!response.ok) {
                    throw new Error('Extraction failed');
                }

                const blob = await response.blob();
                const url = window.URL.createObjectURL(blob);

                const a = document.createElement('a');
                a.href = url;
                a.download = 'vocals.wav';
                document.body.appendChild(a);
                a.click();
                a.remove();

                status.innerText = 'Vocals extracted successfully!';
            } catch (error) {
                status.innerText = 'Error: ' + error.message;
            }
        }
    </script>

</body>
</html>
