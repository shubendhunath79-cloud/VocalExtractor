<!DOCTYPE html>
<html lang="en">
<head>
    <title>Cricket T20 Game</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-blue-900 via-black to-green-900 min-h-screen flex justify-center items-center text-white">

    <div class="bg-white/10 backdrop-blur-lg p-8 rounded-3xl shadow-2xl text-center max-w-md w-full">
        <h1 class="text-5xl font-bold mb-4">🏏 Cricket T20</h1>
        <p class="mb-6 text-gray-300">Choose your shot and score big!</p>

        <div class="text-2xl mb-2">Score: <span id="score">0</span>/<span id="wickets">0</span></div>
        <div class="text-xl mb-6">Overs: <span id="overs">0.0</span></div>

        <div id="result" class="text-3xl font-bold mb-6 text-yellow-400">Match Started!</div>

        <div class="grid grid-cols-3 gap-4">
            <button onclick="playShot(1)" class="bg-blue-600 p-4 rounded-xl hover:bg-blue-700">1 Run</button>
            <button onclick="playShot(4)" class="bg-green-600 p-4 rounded-xl hover:bg-green-700">Four</button>
            <button onclick="playShot(6)" class="bg-red-600 p-4 rounded-xl hover:bg-red-700">Six</button>
        </div>

        <button onclick="restartGame()" class="mt-6 bg-purple-600 px-6 py-3 rounded-xl hover:bg-purple-700">
            New Match
        </button>
    </div>

    <script>
        let score = 0;
        let wickets = 0;
        let balls = 0;
        let gameOver = false;

        function updateDisplay(message = "Choose your shot!") {
            document.getElementById("score").innerText = score;
            document.getElementById("wickets").innerText = wickets;
            document.getElementById("overs").innerText =
                Math.floor(balls / 6) + "." + (balls % 6);
            document.getElementById("result").innerText = message;
        }

        function playShot(runs) {
            if (gameOver) return;

            const outcome = Math.random();

            balls++;

            if (outcome < 0.2) {
                wickets++;
                updateDisplay("OUT! ❌");

                if (wickets >= 10) {
                    gameOver = true;
                    updateDisplay("All Out! Final Score: " + score);
                }
            } else {
                score += runs;
                updateDisplay(runs + " Runs! 🎉");
            }

            if (balls >= 120) {
                gameOver = true;
                updateDisplay("Innings Over! Final Score: " + score);
            }
        }

        function restartGame() {
            score = 0;
            wickets = 0;
            balls = 0;
            gameOver = false;
            updateDisplay("New Match Started!");
        }

        updateDisplay();
    </script>

</body>
</html>
